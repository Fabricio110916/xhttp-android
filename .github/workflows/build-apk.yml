name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Update server IP
      run: |
        echo "Atualizando IP do servidor..."
        find app -name "*.kt" -exec sed -i 's/209.74.85.241/168.138.147.212/g' {} \;
        find app -name "*.kt" -exec sed -i 's/edge.koom.pp.ua/oracle.koom.pp.ua/g' {} \;
        echo "IP atualizado!"
        grep -n "168.138.147.212" app/src/main/java/com/xhttp/tunnel/XHttpVpnService.kt || echo "Verificando..."
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Create gradle.properties
      run: |
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: XHTTP-VPN
        path: app/build/outputs/apk/debug/*.apk
